<div
  class="js-hero-contact-modal pointer-events-none fixed inset-0 z-[220] opacity-0 transition-opacity duration-300"
  aria-hidden="true"
  aria-modal="false"
  role="dialog"
  aria-labelledby="hero-contact-title"
>
  <button
    type="button"
    data-close-hero-contact
    aria-label="Zamknij formularz"
    class="bg-brand-ink/70 absolute inset-0 backdrop-blur-sm"
  ></button>

  <div
    class="relative z-10 flex min-h-full items-center justify-center p-4 sm:p-8"
  >
    <div
      class="js-hero-contact-panel border-brand-white/40 bg-brand-white flex max-h-[92vh] min-h-0 w-full max-w-2xl translate-y-2 scale-[0.98] flex-col overflow-hidden rounded-3xl border p-6 opacity-0 shadow-[0_1.8rem_4rem_rgba(15,23,42,0.35)] transition-all duration-300 sm:p-10"
    >
      <div class="flex items-start justify-between gap-4">
        <div>
          <span
            class="bg-brand-lime text-brand-ink inline-flex items-center rounded-full px-4 py-2 text-xs font-semibold tracking-wide"
          >
            Formularz kontaktowy
          </span>
          <h3
            id="hero-contact-title"
            class="font-heading text-brand-ink mt-5 text-3xl leading-tight font-bold tracking-tight sm:text-4xl"
          >
            Chcesz strony dla swojej firmy?
          </h3>
          <p
            class="text-brand-ink/75 mt-3 text-sm leading-relaxed sm:text-base"
          >
            Opisz krótko swój biznes i cel projektu. Odezwiemy się z propozycją
            rozwiązania.
          </p>
        </div>

        <button
          type="button"
          data-close-hero-contact
          aria-label="Zamknij"
          class="text-brand-ink/70 hover:text-brand-ink border-brand-ink/20 inline-flex h-10 w-10 items-center justify-center rounded-full border text-xl transition-colors"
        >
          &times;
        </button>
      </div>

      <div
        class="[&::-webkit-scrollbar-thumb]:bg-brand-ink/30 [&::-webkit-scrollbar-thumb:hover]:bg-brand-ink/45 mt-8 min-h-0 flex-1 overflow-y-auto overscroll-y-contain pr-1 [scrollbar-color:rgba(35,39,51,0.35)_transparent] [scrollbar-width:thin] sm:pr-2 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-transparent"
      >
        <form
          action="/api/contact"
          method="post"
          data-contact-form
          data-contact-source="hero-modal"
          class="grid grid-cols-1 gap-4 sm:grid-cols-2"
        >
          <input
            type="text"
            name="website"
            tabindex="-1"
            autocomplete="off"
            class="hidden"
            aria-hidden="true"
          />
          <input type="hidden" name="source" value="hero-modal" />
          <div class="space-y-2">
            <label
              for="hero-contact-name"
              class="text-brand-ink/90 block text-sm font-semibold"
            >
              Imię
            </label>
            <input
              id="hero-contact-name"
              name="name"
              data-hero-contact-autofocus
              type="text"
              required
              class="border-brand-ink/15 text-brand-ink focus:border-brand-blue focus:ring-brand-blue/20 w-full rounded-xl border bg-white px-4 py-3 text-sm transition outline-none focus:ring-2"
              placeholder="Twoje imię"
            />
          </div>

          <div class="space-y-2">
            <label
              for="hero-contact-phone"
              class="text-brand-ink/90 block text-sm font-semibold"
            >
              Telefon
            </label>
            <input
              id="hero-contact-phone"
              name="phone"
              type="tel"
              class="border-brand-ink/15 text-brand-ink focus:border-brand-blue focus:ring-brand-blue/20 w-full rounded-xl border bg-white px-4 py-3 text-sm transition outline-none focus:ring-2"
              placeholder="+48..."
            />
          </div>

          <div class="space-y-2 sm:col-span-2">
            <label
              for="hero-contact-email"
              class="text-brand-ink/90 block text-sm font-semibold"
            >
              Email
            </label>
            <input
              id="hero-contact-email"
              name="email"
              type="email"
              required
              class="border-brand-ink/15 text-brand-ink focus:border-brand-blue focus:ring-brand-blue/20 w-full rounded-xl border bg-white px-4 py-3 text-sm transition outline-none focus:ring-2"
              placeholder="you@company.com"
            />
          </div>

          <div class="space-y-2 sm:col-span-2">
            <label
              for="hero-contact-message"
              class="text-brand-ink/90 block text-sm font-semibold"
            >
              Krótko o projekcie
            </label>
            <textarea
              id="hero-contact-message"
              name="message"
              rows="5"
              required
              class="border-brand-ink/15 text-brand-ink focus:border-brand-blue focus:ring-brand-blue/20 w-full rounded-xl border bg-white px-4 py-3 text-sm transition outline-none focus:ring-2"
              placeholder="Np. potrzebuję strony usługowej, integracji z CRM i wsparcia w kampaniach."
            ></textarea>
          </div>

          {% if site.integrations.turnstileSiteKey %}
          <div class="sm:col-span-2">
            <div
              class="cf-turnstile"
              data-sitekey="{{ site.integrations.turnstileSiteKey }}"
            ></div>
          </div>
          {% endif %}

          <p
            data-contact-form-status
            class="text-brand-ink/80 hidden text-sm sm:col-span-2"
            role="status"
            aria-live="polite"
          ></p>

          <div
            class="mt-3 flex flex-col gap-3 sm:col-span-2 sm:flex-row sm:items-center"
          >
            <button
              type="submit"
              data-contact-form-submit
              class="bg-brand-blue text-brand-white inline-flex items-center justify-center rounded-full px-7 py-3 text-sm font-semibold"
            >
              Wyślij zapytanie
            </button>
            <button
              type="button"
              data-close-hero-contact
              class="text-brand-ink border-brand-ink/25 inline-flex items-center justify-center rounded-full border px-7 py-3 text-sm font-semibold"
            >
              Zamknij
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
