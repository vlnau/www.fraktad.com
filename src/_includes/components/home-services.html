{% set servicesSection = homeSections.services %}

<section id="services" class="bg-brand-white text-brand-ink w-full">
  <div class="mx-auto max-w-6xl px-4 py-20 sm:px-8">
    <div
      class="flex flex-col gap-12 lg:flex-row lg:items-end lg:justify-between"
    >
      <div class="max-w-2xl">
        <div class="flex items-center gap-3">
          <span
            class="bg-brand-lime text-brand-ink inline-flex items-center rounded-full px-4 py-2 text-xs font-semibold tracking-wide"
          >
            {{ servicesSection.badge }}
          </span>
        </div>

        <h2
          class="font-heading mt-6 text-4xl leading-tight font-bold tracking-tight sm:text-5xl"
        >
          {{ servicesSection.title }}
        </h2>

        <p class="text-brand-ink/80 mt-6 text-base leading-relaxed sm:text-lg">
          {{ servicesSection.description }}
        </p>
      </div>
    </div>

    <div class="mt-16 grid gap-8 md:grid-cols-2 lg:grid-cols-3">
      {% asyncEach card in serviceCards %} {% include
      "components/service-card.html" %} {% endeach %}
    </div>
  </div>
</section>
