<article class="swiper-slide h-auto pt-2">
  <div
    class="group border-brand-ink/10 bg-brand-white hover:border-brand-blue relative flex h-full flex-col rounded-3xl border p-6 transition-all duration-300 hover:-translate-y-0.5 sm:p-10"
  >
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div class="flex min-w-0 items-center gap-4">
        <img
          src="{{ review.image | url }}"
          alt="{{ review.imageAlt }}"
          class="ring-brand-lime/40 h-14 w-14 rounded-full object-cover ring-2"
          loading="lazy"
          decoding="async"
          width="56"
          height="56"
        />
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold sm:text-base">
            {{ review.name }}
          </p>
          <p class="text-brand-ink/60 text-xs sm:text-sm">{{ review.role }}</p>
        </div>
      </div>
    </div>

    <p
      class="text-brand-ink/80 mt-8 flex-1 text-sm leading-relaxed sm:text-base"
    >
      {{ review.quote }}
    </p>

    <div class="text-brand-ink mt-8 flex items-center gap-1">
      <i class="fa-solid fa-star text-brand-lime"></i>
      <i class="fa-solid fa-star text-brand-lime"></i>
      <i class="fa-solid fa-star text-brand-lime"></i>
      <i class="fa-solid fa-star text-brand-lime"></i>
      <i class="fa-solid fa-star text-brand-lime"></i>
      <span class="text-brand-ink/60 ml-2 text-xs sm:text-sm">
        {{ review.ratingText }}
      </span>
    </div>
  </div>
</article>
