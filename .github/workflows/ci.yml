name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Build
        run: npm run build
